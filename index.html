<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <title>NAM ĐẸP TRAI </title>

    <style>
      body {
        font-family: "Times New Roman";
        background: #95a5b3;
        text-align: center;
        padding: 40px;
      }

      h2 {
        font-size: 50px;
      }

      input {
        width: 75%;
        padding: 25px;

        border: none;
        border-radius: 20px;

        background: #f7a6f7;

        font-size: 20px;

        outline: none;
      }

      button {
        padding: 15px 25px;

        border: none;
        border-radius: 10px;

        background: #5a5341;

        color: white;

        font-size: 18px;

        cursor: pointer;

        margin-top: 20px;
      }

      button:hover {
        transform: scale(1.05);
      }

      iframe {
        width: 100%;
        height: 800px;

        border: none;

        margin-top: 30px;

        border-radius: 20px;
      }

      .script-box {
        margin-top: 30px;

        background: white;

        padding: 20px;

        border-radius: 20px;

        text-align: left;

        overflow: auto;

        font-size: 15px;
      }
    </style>
  </head>

  <body>
    <h2>dán url Scribd vào đây </h2>

    <input type="text" id="url" placeholder="dán link Scribd..." />

    <br />

    <button onclick="convertURL()">MỞ FILE </button>

    <div id="result"></div>

    <script>
      function convertURL() {
        let url = document.getElementById("url").value;
        let match = url.match(/(\d+)/);

        if (!match) {
          alert("Link lỗi ");

          return;
        }

        let id = match[1];

        //  đổi link embeds
        let embed = `https://fr.scribd.com/embeds/${id}/content`;

        document.getElementById("result").innerHTML = `

        <h3>LINK EMBED </h3>

        <input
        value="${embed}"
        style="width:95%"
        readonly>

        <br><br>

        <a href="${embed}" target="_blank">

            <button>
                MỞ SCRIBD 🔥
            </button>

        </a>

        <div class="script-box">

<b> SAU KHI MỞ:</b>

<br><br>

1. kéo xuống cuối trang 😎

<br><br>

2. nhấn F12

<br><br>

3. vào Console

<br><br>

4. paste đoạn này 

<pre>

document.querySelectorAll(".toolbar_drop")
.forEach(el => el.remove());

document.querySelectorAll(".mobile_overlay")
.forEach(el => el.remove());

document.querySelectorAll(".toolbar_top")
.forEach(el => el.remove());

document.querySelectorAll(".toolbar_bottom")
.forEach(el => el.remove());

document.querySelectorAll(".qc-cmp2-container")
.forEach(el => el.remove());

console.log("DONE ");

</pre>

<br>

5. CTRL + P → Save PDF

        </div>

    `;
      }
    </script>
  </body>
</html>
